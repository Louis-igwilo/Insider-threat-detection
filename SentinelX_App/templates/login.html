<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelX | Secure Login</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 30px; font-size: 24px; color: #58a6ff; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #8b949e; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box; /* Prevents input from overflowing */
        }
        input:focus { border-color: #58a6ff; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #2ea043; }
        .error { color: #f85149; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🛡️ SentinelX Access</h1>
        <form method="POST">
            <div class="input-group">
                <label for="username">Analyst ID</label>
                <input type="text" id="username" name="username" placeholder="e.g. admin" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Security Key</label>
                <input type="password" id="password" name="password" placeholder="••••••••••••" required>
            </div>
            <button type="submit">Authorize Access</button>
        </form>
        
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
